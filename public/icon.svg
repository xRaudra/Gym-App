<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="#0A0A0A"/>

  <!-- G plate body (outer r=44, inner r=26, opening ±44°) -->
  <!-- cos44≈0.719 sin44≈0.695 -->
  <!-- Outer top-right: (50+44×0.719, 50−44×0.695) = (81.6, 19.4) ≈ (82,19) -->
  <!-- Outer bot-right: (82, 81) -->
  <!-- Inner top-right: (50+26×0.719, 50−26×0.695) = (68.7, 31.9) ≈ (69,32) -->
  <!-- Inner bot-right: (69, 68) -->
  <path
    d="M 82 19
       A 44 44 0 1 0 82 81
       L 69 68
       A 26 26 0 1 1 69 32
       Z"
    fill="#181818"
  />

  <!-- Crossbar -->
  <path
    d="M 68 41 L 94 41 Q 97 41 97 44 L 97 56 Q 97 59 94 59 L 68 59 Z"
    fill="#67DE6D"
  />

  <!-- Center hole -->
  <circle cx="50" cy="50" r="26" fill="#0A0A0A"/>

  <!-- GG in hole -->
  <text x="50" y="55"
    text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="14" font-weight="900" fill="#67DE6D" letter-spacing="-0.5">GG</text>
</svg>
